name: Build and Delivery
on:
  workflow_run:
    workflows: ["Test Python App"]
    types: [completed]
    branches: ['main']
jobs:
  cd:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
    - name: Debug credentials # login error
      run: |
        echo "USERNAME: ${{ vars.DOCKERHUB_USERNAME }}"
        echo "TOKEN_LEN: $(echo '${{ secrets.DOCKERHUB_TOKEN }}' | wc -c)"
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        # username: ${{ vars.DOCKERHUB_USERNAME }}
        # password: ${{ secrets.DOCKERHUB_TOKEN }} 
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Push image
      uses: docker/build-push-action@v6
      with:
        push: true
        # tags: ${{ vars.DOCKERHUB_USERNAME }}/my-app:latest
        tags: ghcr.io/${{ vars.DOCKERHUB_USERNAME }}/my-app:latest
    permissions:
      contents: read
      packages: write
